name: hailmary_health
description: "HailMary Health — Emergency-first AI-assisted health response for patients."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.4.0
  camera: ^0.11.0+2
  image_picker: ^1.0.7
  google_fonts: ^6.1.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  uuid: ^4.3.3
  permission_handler: ^11.3.0
  sensors_plus: ^5.0.1
  flutter_displaymode: ^0.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
